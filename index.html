<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0">
		<title>NeighborhoodNerd21</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
			crossorigin="anonymous">
		<link
			href="./styles.css"
			rel="stylesheet">
	</head>

	<body>
		<!-- hero -->
		<div
			id="hero"
			class="mx-4 mt-0 pt-0 px-1 px-md-4 py-5 rounded-bottom-4 text-center shadow-lg">
			<div class="container px-2">
				<div class="row flex-lg-row-reverse align-items-center align-items-xl-end px-2 pt-4">
					<div class="col-12 col-xl-6 px-4 d-flex flex-column flex-md-row flex-xl-column gap-4 mb-4">
						<div class="col-md-6 col-xl-12 justify-content-lg-start">
							<span class="fs-5 d-block fw-normal text-warning font-monospace text-start text-lg-start text-xl-end aria-hidden mb-3"
								>&lt;div id="photo"&gt;</span
							>
							<div class="profile-box justify-content-start justify-content-xl-end">
								<img
									src="./images/profile.jpg"
									class="profile-img rounded-2 border"
									alt="profile">
							</div>
							<span class="fs-5 d-block fw-normal text-warning font-monospace text-start text-lg-start text-xl-end aria-hidden mt-3">&lt;/div&gt;</span>
						</div>
						<div class="col-md-6 col-xl-12 justify-content-lg-end">
							<span class="fs-5 d-block fw-normal text-warning font-monospace text-start text-md-end aria-hidden mb-2">&lt;div id="certs"&gt;</span>
							<div class="certs justify-content-start justify-content-md-end mt-0">
								<a
									href="https://app-na2.hubspot.com/academy/achievements/lt791t23/en/1/britt-snodgrass-ii/seo"
									title="SEO">
									<img
										src="./images/seo-cert-badge.jpg"
										alt="seo certificate">
								</a>
								<a
									href="https://www.freecodecamp.org/certification/fccb9e07699-425a-4cf1-be69-a2182f7e9606/responsive-web-design"
									title="RWD">
									<img
										src="./images/responsive-web-design-cert-badge.jpg"
										alt="rwd certificate">
								</a>
								<a
									href="https://www.freecodecamp.org/certification/fccb9e07699-425a-4cf1-be69-a2182f7e9606/foundational-c-sharp-with-microsoft"
									title="CSHARP">
									<img
										src="./images/csharp-fundamentals.jpg"
										alt="csharp certificate">
								</a>
							</div>
							<span class="fs-5 d-block fw-normal text-warning font-monospace text-start text-md-end aria-hidden mt-2">&lt;/div&gt;</span>
						</div>
					</div>
					<div class="col-12 col-xl-6 align-items-xl-end">
						<span class="fs-5 d-block fw-normal text-warning font-monospace text-start aria-hidden mb-2">&lt;div id="info"&gt;</span>
						<h1 class="display-5 fw-bold text-white text-start lh-1 mb-2 border-bottom">NeighborhoodNerd21</h1>
						<p class="lead text-white fw-bold mb-3 text-start">Britt Snodgrass - Developer</p>
						<address class="text-white text-start">
							<p class="mb-0">Email: neighborhoodnerd21@protonmail.com</p>
							<p class="mb-0">Phone: (765) 618-0584</p>
						</address>
						<span class="fs-5 d-block fw-normal text-warning font-monospace text-start aria-hidden">&lt;/div&gt;</span>
					</div>
				</div>
			</div>
		</div>
		<div
			class="container-fluid px-5 py-5"
			id="custom-cards">
			<div class="row row-cols-1 row-cols-lg-3 align-items-stretch g-4 py-4">
				<div class="col">
					<div class="card card-container3 card-cover h-100 overflow-hidden text-bg-dark rounded-4 shadow-lg">
						<div class="d-flex flex-column h-100 p-5 pb-3 text-white text-shadow-1">
							<h3 class="pt-5 mt-5 mb-4 display-6 lh-1 fw-bold">Colorblind Accessibility</h3>
						</div>
					</div>
				</div>
				<div class="col">
					<div class="card card-container1 card-cover h-100 overflow-hidden text-bg-dark rounded-4 shadow-lg">
						<div class="d-flex flex-column h-100 p-5 pb-3 text-white text-shadow-1">
							<h3 class="pt-5 mt-5 mb-4 display-6 lh-1 fw-bold">Open Source Solutions</h3>
						</div>
					</div>
				</div>
				<div class="col">
					<div class="card card-container2 card-cover h-100 overflow-hidden text-bg-dark rounded-4 shadow-lg">
						<div class="d-flex flex-column h-100 p-5 pb-3 text-white text-shadow-1">
							<h3 class="pt-5 mt-5 mb-4 display-6 lh-1 fw-bold">CLI Tools & Scripting</h3>
						</div>
					</div>
				</div>
			</div>
		</div>
		<!-- footer -->
		<div
			style="background-color: black"
			class="mx-4 my-2 pb-0 rounded-4">
			<div class="container">
				<footer class="d-flex flex-wrap justify-content-between align-items-center py-3 my-4">
					<p class="col-md-4 mb-0 text-white">NeighborhoodNerd21</p>
					<a
						href="./index.html"
						class="col-md-4 d-flex align-items-center justify-content-center mb-3 mb-md-0 me-md-auto link-body-emphasis text-decoration-none"
						aria-label="NeighborhoodNerd21">
						<img
							src="./images/logo.jpg"
							alt="logo"
							class="rounded-1"
							width="50px">
					</a>
					<div class=" nav col-md-4 justify-content-end">
						<a
							href="https://theneighborhoodnerdblog.blogspot.com/"
							class="nav-link px-2 text-white"
							>NN21_Blog</a
						>
					</div>
				</footer>
			</div>
		</div>
	</body>
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous"></script>
</html>
