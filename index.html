<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0">
    <title>NeighborhoodNerd21</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous">
    <link
      href="./styles.css"
      rel="stylesheet">
  </head>

  <body>
    <!-- hero -->
    <div
      id="hero"
      class="mx-3 mx-md-4 mt-0 pt-0 px-0 px-md-4 pt-5 mb-3 rounded-bottom-4 text-center shadow-lg">
      <div class="container-fluid px-3 pt-5">
        <div
          class="row flex-lg-row-reverse align-items-end px-0 px-md-4 py-5 outer-box rounded-4">
          <div class="col-12 col-xl-5 text-md-end">
            <img
              src="./images/nn21/profile.jpg"
              class="profile-img rounded-2 border"
              alt="profile">
          </div>
          <div
            class="col-12 col-xl-7 info-box rounded-3 px-0 px-md-4 py-4 text-center text-md-start">
            <h1 class="display-5 fw-bold text-white mb-2 border-bottom">
              NeighborhoodNerd21
            </h1>
            <p class="text-white fw-bold mb-0 fs-2">Britt Snodgrass</p>
            <p class="text-white fs-5 fw-light mb-5">Consultant & Developer</p>
            <address class="text-white">
              <p class="mb-0 fs-4">
                <a
                  href="phone:+17656180584"
                  class="text-decoration-none text-white"
                  >765.618.0584</a
                >
              </p>
              <p class="">
                <a
                  href="mailto:neighborhoodnerd21@protonmail.com"
                  class="text-decoration-none text-white"
                  >neighborhoodnerd21@protonmail.com</a
                >
              </p>
            </address>
          </div>
        </div>
      </div>
    </div>
    <div
      class="container-fluid px-3 py-3 px-md-5 py-md-5"
      id="custom-cards">
      <div class="row row-cols-1 row-cols-lg-3 align-items-stretch g-4">
        <div class="col">
          <div
            class="card card-container3 card-cover h-100 overflow-hidden text-bg-dark rounded-4 shadow-lg">
            <div
              class="d-flex flex-column h-100 p-4 p-md-5 pb-3 text-white text-shadow-1">
              <h2 class="pt-5 mt-5 display-6 lh-1 fw-bold">
                Blogging and Documentation
              </h2>
              <p class="lead">Nerds Helping Nerds be Nerds</p>
            </div>
          </div>
        </div>
        <div class="col">
          <div
            class="card card-container1 card-cover h-100 overflow-hidden text-bg-dark rounded-4 shadow-lg">
            <div
              class="d-flex flex-column h-100 p-4 p-md-5 pb-3 text-white text-shadow-1">
              <h3 class="pt-5 mt-5 display-6 lh-1 fw-bold">
                Free & Open Source Solutions
              </h3>
              <p class="lead">For Developers and Small Businesses</p>
            </div>
          </div>
        </div>
        <div class="col">
          <div
            class="card card-container2 card-cover h-100 overflow-hidden text-bg-dark rounded-4 shadow-lg">
            <div
              class="d-flex flex-column h-100 p-4 p-md-5 pb-3 text-white text-shadow-1">
              <h3 class="pt-5 mt-5 display-6 lh-1 fw-bold">
                Nux Systems Administration
              </h3>
              <p class="lead">Scripting and Automation</p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- footer -->
    <div class="container-fluid px-md-4 py-md-3">
      <footer
        class="d-flex flex-column flex-md-row px-4 py-3 rounded-4 shadow-lg align-items-center justify-content-between gap-3"
        style="background-color: #141414">
        <nav
          id="badges"
          class="nav gap-3 flex-row justify-content-around">
          <a
            href="https://app-na2.hubspot.com/academy/achievements/lt791t23/en/1/britt-snodgrass-ii/seo"
            class="text-decoration-none"
            aria-label="Search Engine Optimization Certification">
            <img
              src="./images/badges/seo-cert-badge.png"
              alt="logo"
              height="40">
          </a>
          <a
            href="https://www.freecodecamp.org/certification/fccb9e07699-425a-4cf1-be69-a2182f7e9606/foundational-c-sharp-with-microsoft"
            class="text-decoration-none"
            aria-label="Foundational CSharp with Microsoft Certification">
            <img
              src="./images/badges/csharp-cert-badge.png"
              alt="logo"
              height="40">
          </a>
          <a
            href="https://www.freecodecamp.org/certification/fccb9e07699-425a-4cf1-be69-a2182f7e9606/responsive-web-design"
            class="text-decoration-none"
            aria-label="responsive web design certification">
            <img
              src="./images/badges/rwd-cert-badge.png"
              alt="logo"
              height="40">
          </a>
        </nav>
        <nav
          id="links"
          class="nav gap-1">
          <a
            href="https://github.com/neighborhoodnerd21"
            class="text-decoration-none"
            aria-label="github profile">
            <img
              src="./images/icons/github.png"
              alt="github"
              class="nav-icon">
          </a>
          <a
            href="https://theneighborhoodnerdblog.blogspot.com/"
            class="text-decoration-none"
            aria-label="blog">
            <img
              src="./images/icons/blogger.png"
              alt="logo"
              class="nav-icon">
          </a>
          <a
            href="www.linkedin.com/in/britt-snodgrass-ii-039b95320"
            class="text-decoration-none"
            aria-label="linkedin">
            <img
              src="./images/icons/linkedin.png"
              alt="logo"
              class="nav-icon">
          </a>
        </nav>
      </footer>
      <div
        id="validations"
        class="container-fluid px-4 pt-4 align-items-center">
        <p class="text-end">
          <a href="http://jigsaw.w3.org/css-validator/">
            <img
              style="border:0;width:50px;height:18px"
              src="http://jigsaw.w3.org/css-validator/images/vcss"
              alt="Valid CSS!">
          </a>
          <a
            title="W3C, Public domain, via Wikimedia Commons"
            href="https://commons.wikimedia.org/wiki/File:Valid_HTML_4.0.svg"
            ><img
              style="border:0;width:50px;height:18px"
              alt="Valid HTML 4.0"
              src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/ff/Valid_HTML_4.0.svg/960px-Valid_HTML_4.0.svg.png"></a
          >
        </p>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous">
    </script>
  </body>
</html>
